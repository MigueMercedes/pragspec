name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - name: Smoke — lean install (no extensions)
        run: |
          TMP=$(mktemp -d)
          cd "$TMP"
          node ${{ github.workspace }}/bin/cli.js init --yes --project-name "ci-test" --stack node
          test -f AGENTS.md
          test -f CLAUDE.md
          # CLAUDE.md must be a thin shim pointing to AGENTS.md (under 20 lines)
          [ "$(wc -l < CLAUDE.md)" -lt 20 ]
          grep -q "AGENTS.md" CLAUDE.md
          test -f SPEC_PIPELINE.md
          test -f .claude/skills/sdd/SKILL.md
          test -f .claude/skills/sdd-init/SKILL.md
          test -f specs/templates/extensions/README.md
          test ! -f .gitignore.additions
          test -f specs/templates/extensions/multi-tenant.md
          test -f specs/templates/extensions/persistent-data.md
          ! grep -q "{{PROJECT_NAME}}" AGENTS.md
          ! grep -q "## Multi-tenant boundary" specs/templates/feature.spec.md
          # Companion-skill canonicalization: AGENTS.md is the single source
          grep -q "### Companion skills" AGENTS.md
          grep -q "superpowers:executing-plans" AGENTS.md
          grep -q "superpowers:requesting-code-review" AGENTS.md
          grep -q "superpowers:using-git-worktrees" AGENTS.md
          # sdd skill declares the [if available: ...] convention
          grep -q "Companion skill convention" .claude/skills/sdd/SKILL.md
          grep -q "\[if available: superpowers:" .claude/skills/sdd/SKILL.md
          echo "Lean smoke OK"

      - name: Smoke — with extensions
        run: |
          TMP=$(mktemp -d)
          cd "$TMP"
          node ${{ github.workspace }}/bin/cli.js init --yes --project-name "ci-test-fat" --stack node --extensions multi-tenant,persistent-data,operational
          grep -q "## Multi-tenant boundary" specs/templates/feature.spec.md
          grep -q "## Migration impact" specs/templates/feature.spec.md
          grep -q "## Operational" specs/templates/feature.spec.md
          grep -q "Extensions enabled: multi-tenant, persistent-data, operational" specs/templates/feature.spec.md
          # Review notes must remain at the bottom
          tail -20 specs/templates/feature.spec.md | grep -q "## Review notes"
          echo "Extensions smoke OK"

      - name: Smoke — invalid extension fails fast
        run: |
          TMP=$(mktemp -d)
          cd "$TMP"
          if node ${{ github.workspace }}/bin/cli.js init --yes --extensions not-real-ext; then
            echo "ERROR: invalid extension should have failed"
            exit 1
          fi
          echo "Invalid extension rejection OK"
